name: render-keepalive

on:
  schedule:
    - cron: "*/5 * * * *" # toutes les 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Ping Render service (keepalive)
        env:
          PING_URL: https://laugr-bakery.onrender.com
        run: |
          set -e
          code="$(curl -L -sS -o /dev/null -w "%{http_code}" \
            --connect-timeout 15 \
            --max-time 90 \
            --retry 2 \
            --retry-delay 10 \
            --retry-all-errors \
            "$PING_URL" || echo "000")"

          if [ "$code" = "000" ] || [ -z "$code" ]; then
            echo "Ping failed after retries for $PING_URL"
            exit 1
          fi

          echo "Ping OK: HTTP $code for $PING_URL"
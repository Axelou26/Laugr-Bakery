spring:
  application:
    name: cookie-shop-api

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Local : H2 fichier. Prod (Render) : SPRING_DATASOURCE_URL + USERNAME + PASSWORD (Neon, etc.).
  # Ne pas fixer driver-class-name : Spring choisit H2 ou PostgreSQL selon l’URL.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/cookieshop;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # database-platform retiré : Hibernate détecte automatiquement H2 (évite HHH90000025)

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  # Render / Railway injectent PORT ; en local on garde 8081
  port: ${PORT:8081}

# Upload d'images
app:
  upload-dir: uploads
  base-url: http://localhost:8081

# CORS — en prod (Render) : variable d’environnement cors.allowed-origins (URLs séparées par des virgules)
cors:
  allowed-origins: http://localhost:4200,http://127.0.0.1:4200

# JWT
jwt:
  secret: cookieShopSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong
  expiration: 86400000

# PayPal (sandbox pour les tests - crée un compte sur developer.paypal.com)
paypal:
  client-id: ${PAYPAL_CLIENT_ID:}
  client-secret: ${PAYPAL_CLIENT_SECRET:}
  mode: sandbox

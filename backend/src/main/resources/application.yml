spring:
  application:
    name: cookie-shop-api

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Développement local uniquement (H2). En prod Docker → profil `prod` + application-prod.yml (PostgreSQL / Neon).
  datasource:
    url: jdbc:h2:file:./data/cookieshop;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # database-platform retiré : Hibernate détecte automatiquement H2 (évite HHH90000025)

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  # Render / Railway injectent PORT ; en local on garde 8081
  port: ${PORT:8081}

# Upload d'images
app:
  upload-dir: uploads
  base-url: http://localhost:8081

# CORS — en prod (Render) : variable d’environnement cors.allowed-origins (URLs séparées par des virgules)
cors:
  allowed-origins: http://localhost:4200,http://127.0.0.1:4200

# JWT
jwt:
  secret: cookieShopSecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong
  expiration: 86400000

# PayPal — sandbox ou live : PAYPAL_CLIENT_ID, PAYPAL_CLIENT_SECRET, PAYPAL_MODE (Render / terminal).
# En local : voir application-local.yml.example (profil spring: local).
paypal:
  client-id: ${PAYPAL_CLIENT_ID:}
  client-secret: ${PAYPAL_CLIENT_SECRET:}
  mode: ${PAYPAL_MODE:sandbox}

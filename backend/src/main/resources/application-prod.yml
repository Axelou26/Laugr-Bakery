# Activé sur Render via SPRING_PROFILES_ACTIVE=prod (voir Dockerfile).
# Supprime toute ambiguïté H2 / PostgreSQL et fixe le dialecte Hibernate.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false

# Même clés que sur developer.paypal.com (Render : variables d’environnement).
paypal:
  client-id: ${PAYPAL_CLIENT_ID:}
  client-secret: ${PAYPAL_CLIENT_SECRET:}
  mode: ${PAYPAL_MODE:sandbox}
